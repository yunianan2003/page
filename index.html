<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>半开门 · 念头通达</title>
    <style>
        /* 基础重置 & 字体 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #1f2e1f;  /* 深色林间背景，衬托门扉 */
            background-image: radial-gradient(circle at 30% 40%, #2f4f2f, #1a2a1a);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Trebuchet MS', '华文楷体', 'KaiTi', 'Microsoft YaHei', serif;
            padding: 1.5rem;
        }

        /* 整体场景——横板，透视感 */
        .scene {
            width: min(1000px, 90vw);
            height: min(600px, 60vh);
            position: relative;
            margin: 0 auto 2rem;
            perspective: 1400px;
            box-shadow: 0 30px 40px -20px rgba(0,0,0,0.7);
            border-radius: 12px 12px 8px 8px;
            transition: all 0.2s;
        }

        /* 门框——所有元素的容器 */
        .door-frame {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 16px 16px 8px 8px;
            overflow: visible;  /* 让旋转的门扇不至于被裁剪，同时上方匾额可见 */
            background: transparent;
            box-shadow: inset 0 0 0 2px #7c5e3a, 0 10px 25px rgba(0,0,0,0.5);  /* 门框外缘 */
        }

        /* 草原背景——从门缝和半开的门中露出的广阔世界 */
        .grassland-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: linear-gradient(145deg, #98c8a0 0%, #6aa875 40%, #3d7840 100%);
            /* 增加草原细节：野花、光斑、远山 */
            background-image: 
                radial-gradient(circle at 20% 70%, #e3ffb2 6px, transparent 6px),
                radial-gradient(circle at 45% 85%, #f9f0b5 10px, transparent 10px),
                radial-gradient(circle at 78% 40%, #c4e68c 15px, transparent 15px),
                radial-gradient(circle at 90% 20%, #daf0aa 8px, transparent 8px),
                radial-gradient(circle at 10% 30%, #b8e087 12px, transparent 12px),
                linear-gradient(180deg, #b0d9b0 0%, #6c9e6c 90%);
            background-blend-mode: overlay, normal;
            border-radius: 14px 14px 8px 8px;
            box-shadow: inset 0 0 30px #528a52;
        }

        /* 增加天空渐变层次（草原背景的上半部分） */
        .grassland-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 35%;
            background: linear-gradient(to bottom, #a4cfdf, #c4e6d4, transparent);
            opacity: 0.45;
            pointer-events: none;
        }

        /* 远山/云朵的意向 */
        .grassland-bg::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 70% 20%, #fff6d5 5%, transparent 25%),
                        radial-gradient(ellipse at 15% 60%, #e0f0b0 8%, transparent 25%),
                        repeating-linear-gradient(45deg, rgba(120, 150, 80, 0.2) 0px, rgba(120, 150, 80, 0.2) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
        }

        /* 门扇基础样式 —— 木纹感 */
        .door-left, .door-right {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            background: #a5784b;  /* 木头基色 */
            background-image: repeating-linear-gradient(90deg, 
                rgba(140, 90, 40, 0.4) 0px, 
                rgba(100, 65, 25, 0.5) 2px, 
                transparent 2px, 
                transparent 10px),
                radial-gradient(circle at 20% 30%, #b88d5e, #7b562e 80%);
            box-shadow: inset -4px -4px 12px #4f321a, inset 4px 4px 12px #dbb48b;
            border: 2px solid #5f3f24;
            z-index: 2;      /* 覆盖草原，但留出缝隙 */
            transition: transform 0.1s ease;
            transform-style: preserve-3d;
            backface-visibility: visible;
        }

        /* 左门 (保持关闭，无旋转) */
        .door-left {
            left: 0%;
            border-radius: 14px 0 0 8px;
            transform: rotateY(0deg) translateZ(1px);  /* 轻微前推，与3D场景融合 */
            border-right: 4px solid #372511;
        }

        /* 右门 —— 半开状态，绕左边轴内旋，露出草原 */
        .door-right {
            left: 50%;
            transform-origin: left center;
            transform: rotateY(28deg) translateZ(2px);   /* 半开角度，内部草原显露 */
            border-radius: 0 14px 8px 0;
            border-left: 3px solid #4c311a;
            box-shadow: -10px 10px 20px rgba(0,0,0,0.3), inset 0 0 30px #61411e;
            z-index: 3;      /* 右门略高于左门，形成前后层次 */
        }

        /* 门板木条装饰 */
        .door-left::before, .door-right::before {
            content: '';
            position: absolute;
            top: 15%;
            left: 20%;
            width: 60%;
            height: 70%;
            border: 2px solid #6f4f2f;
            border-radius: 30px;
            background: rgba(160, 120, 70, 0.2);
            box-shadow: inset 0 0 20px #ac874b;
        }

        /* 门把手 (左门 + 右门) */
        .door-left::after {
            content: '';
            position: absolute;
            top: 55%;
            right: 15%;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle at 30% 30%, #f3c57b, #ad7b41);
            border-radius: 50%;
            box-shadow: 2px 2px 6px #2d1f0e, -1px -1px 4px #eedbaa;
            border: 1px solid #785d32;
            z-index: 5;
        }

        .door-right::after {
            content: '';
            position: absolute;
            top: 45%;
            left: 15%;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle at 30% 30%, #f3c57b, #ad7b41);
            border-radius: 50%;
            box-shadow: 2px 2px 6px #2d1f0e, -1px -1px 4px #eedbaa;
            border: 1px solid #785d32;
            z-index: 5;
            transform: rotateY(-28deg); /* 抵消部分门扇旋转，让把手保持圆感，但保留一点透视 */
        }

        /* 对联区域 (左右立柱) —— 竖排，古风 */
        .couplet-left, .couplet-right {
            position: absolute;
            top: 12%;
            width: 48px;
            height: 76%;
            background: #2f2a1f;      /* 深色匾柱 */
            background: linear-gradient(135deg, #3f3729, #1e1910);
            border: 3px solid #ab8d57;
            border-radius: 24px 24px 12px 12px;
            box-shadow: 0 10px 15px #0f0e09, inset 0 0 10px #d4b185;
            writing-mode: vertical-rl;
            text-orientation: upright;
            color: #f9e7b3;
            font-size: clamp(1.2rem, 3vw, 1.7rem);
            font-weight: bold;
            letter-spacing: 8px;
            text-shadow: 2px 2px 0px #3f2f18, 4px 4px 8px black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;              /* 置于门扇之上 */
            padding: 0.8rem 0;
            line-height: 2.2rem;
            font-family: '华文楷体', 'KaiTi', '楷体', serif;
            white-space: nowrap;
        }

        /* 右联：上联（面对门时右侧） */
        .couplet-right {
            right: -15px;            /* 稍稍伸出右边框，强调立柱感 */
            border-right: 5px solid #ab8d57;
        }

        /* 左联：下联 */
        .couplet-left {
            left: -15px;
            border-left: 5px solid #ab8d57;
        }

        /* 门上方横批：念头通达 */
        .lintel {
            position: absolute;
            top: -40px;              /* 提升到门框上方 */
            left: 50%;
            transform: translateX(-50%);
            background: #2d2519;
            background: linear-gradient(145deg, #564728, #2a1f12);
            border: 4px solid #baa065;
            border-radius: 60px 60px 20px 20px;
            padding: 0.8rem 2.5rem;
            box-shadow: 0 10px 0 #0e0b06, 0 15px 20px black;
            z-index: 20;
            white-space: nowrap;
            font-size: clamp(1.8rem, 5vw, 2.6rem);
            font-weight: 800;
            color: #fceec7;
            text-shadow: 3px 3px 0 #7d5f34, 5px 5px 8px #00000080;
            letter-spacing: 6px;
            font-family: '华文楷体', 'KaiTi', serif;
            text-align: center;
        }

        /* 底部诗句 */
        .footer-quote {
            text-align: center;
            color: #dbcba4;
            font-size: clamp(1rem, 3vw, 1.5rem);
            font-style: italic;
            text-shadow: 2px 2px 3px #1f2b13;
            border-top: 1px dashed #b8a87b;
            padding-top: 1rem;
            margin-top: 1.5rem;
            width: fit-content;
            max-width: 90%;
            background: #2b402b80;
            backdrop-filter: blur(3px);
            border-radius: 50px;
            padding: 0.8rem 2rem;
            box-shadow: 0 5px 15px #142014;
            font-family: 'Georgia', '华文楷体', serif;
            letter-spacing: 2px;
        }

        /* 增加门与背景的深度 */
        .door-frame::before {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border: 3px solid #b39766;
            border-radius: 24px 24px 16px 16px;
            pointer-events: none;
            z-index: 15;
            box-shadow: inset 0 0 0 1px #fdebb3, 0 8px 20px #000000b3;
        }

        /* 在门缝中加强草原可见度，给右门边缘加一点光 */
        .door-right {
            border-right: 3px solid #856e47;
        }

        /* 手机小屏适配 */
        @media (max-width: 600px) {
            .couplet-left, .couplet-right {
                width: 30px;
                font-size: 0.9rem;
                letter-spacing: 3px;
            }
            .lintel {
                font-size: 1.5rem;
                padding: 0.3rem 1.5rem;
                top: -30px;
            }
            .door-left::after, .door-right::after {
                width: 15px;
                height: 15px;
            }
        }

        /* 确保横板不扭曲 */
        @media (max-aspect-ratio: 1/1) {
            .scene {
                height: min(50vh, 500px);
            }
        }
    </style>
</head>
<body>
    <!-- 主场景 -->
    <div class="scene">
        <div class="door-frame">

            <!-- 广阔的草原背景 (从门缝、半开门中可见) -->
            <div class="grassland-bg"></div>

            <!-- 左门扇 (关闭) -->
            <div class="door-left"></div>

            <!-- 右门扇 (半开) 内旋露出草原 -->
            <div class="door-right"></div>

            <!-- 对联：右侧上联 "放下千般思虑静" (面对门时右手边) -->
            <div class="couplet-right">放下千般思虑静</div>

            <!-- 对联：左侧下联 "观得一念本来明" -->
            <div class="couplet-left">观得一念本来明</div>

            <!-- 门上方横匾：念头通达 -->
            <div class="lintel">念头通达</div>

        </div> <!-- door-frame -->
    </div> <!-- scene -->

    <!-- 底部小字：花径不曾缘客扫，蓬门今始为君开 -->
    <div class="footer-quote">
        🌿 花径不曾缘客扫，蓬门今始为君开 🌿
    </div>

    <!-- 注：整体横板，门扉半开，草原在缝隙间显现，意境悠远 -->
</body>
</html>
